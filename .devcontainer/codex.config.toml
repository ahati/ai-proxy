# ==========================================
# GLOBAL SETTINGS & DEFAULTS
# ==========================================
model = "qwen3.5-plus"
model_provider = "proxy_ai"
model_catalog_json = "/home/vscode/custom_models.json"
disabled_providers = ["opencode"]
model_reasoning_effort = "medium"
model_reasoning_summary="detailed"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
approvals_reviewer = "user"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
# ==========================================
# PROVIDER DEFINITIONS
# ==========================================

[model_providers.proxy_ai]
name = "proxy"
base_url = "http://host.docker.internal:8080/v1"
api_key = "sk-cp-dummy"


[projects."/workspaces/kimi-k2.5-fix-proxy"]
trust_level = "trusted"

[projects."/workspaces/temporary/codex"]
trust_level = "trusted"

[projects."/workspaces/temporary/summarizer"]
trust_level = "trusted"

[projects."/workspaces/temporary/shooting-star"]
trust_level = "trusted"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["model-with-reasoning", "current-dir", "project-root", "git-branch", "context-used"]

[features]
unified_exec = true
guardian_approval = true
multi_agent = true

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
